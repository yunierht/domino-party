<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Party — Dominoes Scorekeeper for Two Teams</title>
  <meta name="description" content="The easiest way to keep score for dominoes. Big score rings, live game-following with a QR code, stats & rivalries, four themes — free, no ads, no account. English & Spanish." />
  <meta name="theme-color" content="#070709" />
  <link rel="canonical" href="https://dominoparty.com/" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Domino Party — Dominoes Scorekeeper" />
  <meta property="og:description" content="Keep score, share the game live, and remember every rivalry. Free, no ads, no account." />
  <meta property="og:url" content="https://dominoparty.com/" />
  <meta property="og:image" content="https://dominoparty.com/img/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://dominoparty.com/img/og.png" />
  <link rel="icon" type="image/png" href="img/icon.png" />
  <link rel="apple-touch-icon" href="img/icon.png" />
  <style>
    :root{
      --bg:#070709; --bg2:#0b0d12; --surface:#14161b; --surface2:#1b1e25;
      --border:#272b34; --text:#f5f6f8; --muted:#9096a1;
      --cyan:#22D3EE; --purple:#A78BFA; --blue:#5B8DEF; --pink:#F472B6; --red:#D2515F;
      --grad:linear-gradient(135deg,#22D3EE,#A78BFA);
      --radius:18px; --maxw:1120px;
    }
    *{box-sizing:border-box; margin:0; padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.6; overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px}
    .grad-text{background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
    .eyebrow{display:inline-block; font-size:.8rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--cyan); margin-bottom:18px}

    /* ambient background glows */
    .glow{position:fixed; border-radius:50%; filter:blur(90px); opacity:.5; z-index:-1; pointer-events:none}
    .glow.a{width:520px;height:520px; top:-160px; left:-120px; background:radial-gradient(circle,#1a6b8c,transparent 70%)}
    .glow.b{width:560px;height:560px; top:280px; right:-180px; background:radial-gradient(circle,#5a3f9e,transparent 70%)}

    /* header */
    header.nav{position:sticky; top:0; z-index:50; transition:background .3s,border-color .3s, backdrop-filter .3s; border-bottom:1px solid transparent}
    header.nav.scrolled{background:rgba(7,7,9,.72); backdrop-filter:blur(14px); border-bottom-color:var(--border)}
    .nav-inner{display:flex; align-items:center; justify-content:space-between; height:68px}
    .brand{display:flex; align-items:center; gap:11px}
    .brand img{height:50px; width:auto; display:block}
    .hero-logo{height:115px; width:auto; display:block; margin-bottom:22px; filter:drop-shadow(0 8px 24px rgba(0,0,0,.45))}
    .nav-links{display:flex; align-items:center; gap:30px}
    .nav-links a{color:var(--muted); font-weight:600; font-size:.95rem; transition:color .2s}
    .nav-links a:hover{color:var(--text)}
    .nav-right{display:flex; align-items:center; gap:14px; margin-left:auto}
    .lang{display:flex; border:1px solid var(--border); border-radius:999px; overflow:hidden; font-size:.8rem; font-weight:800}
    .lang button{background:none; border:0; color:var(--muted); padding:7px 12px; cursor:pointer; transition:.2s}
    .lang button.on{background:var(--grad); color:#04121a}
    .btn{display:inline-flex; align-items:center; gap:9px; font-weight:800; border-radius:999px; padding:12px 20px; cursor:pointer; border:0; transition:transform .15s, box-shadow .2s; font-size:.95rem; white-space:nowrap}
    .btn-grad{background:var(--grad); color:#04121a; box-shadow:0 8px 26px rgba(34,211,238,.28)}
    .btn-grad:hover{transform:translateY(-2px); box-shadow:0 12px 32px rgba(34,211,238,.36)}
    .btn-ghost{background:var(--surface); color:var(--text); border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--cyan); color:#fff}
    .nav-links .menu-btn, .menu-btn{display:none}

    /* hero */
    .hero{padding:74px 0 70px}
    .hero-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:54px; align-items:center}
    h1.hero-title{font-size:clamp(2.4rem,5.4vw,4rem); line-height:1.04; font-weight:900; letter-spacing:-.025em}
    .hero p.lead{font-size:1.18rem; color:#c8ccd4; margin:22px 0 30px; max-width:540px}
    .cta-row{display:flex; gap:14px; flex-wrap:wrap; align-items:center}
    .store-badge{display:inline-flex; align-items:center; gap:11px; background:#111317; border:1px solid var(--border); border-radius:14px; padding:11px 18px; transition:.2s}
    .store-badge:hover{border-color:#3a4150; transform:translateY(-2px)}
    .store-badge svg{width:24px;height:24px; flex:none}
    .store-badge .sb-sm{font-size:.66rem; color:var(--muted); line-height:1.1}
    .store-badge .sb-lg{font-size:1.02rem; font-weight:800; line-height:1.15}
    .store-badge.soon{opacity:.6}
    .beta-note{margin-top:16px; font-size:.86rem; color:var(--muted)}
    .beta-note b{color:var(--cyan)}

    /* phone mockup */
    .phone-wrap{display:flex; justify-content:center; position:relative}
    .float-tile{position:absolute; opacity:.5; animation:bob 6s ease-in-out infinite}
    .phone{position:relative; width:300px; border-radius:42px; background:linear-gradient(160deg,#1c1f27,#0c0e12); border:1px solid #2b2f39; padding:14px; box-shadow:0 40px 90px -30px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.03) inset; transform:rotate(2.5deg)}
    .screen{background:#070709; border-radius:30px; padding:20px 16px 22px; overflow:hidden}
    .scr-head{display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:.78rem; font-weight:700; margin-bottom:16px}
    .scr-head .live{display:flex;align-items:center;gap:6px; color:var(--red); font-weight:900}
    .scr-head .live i{width:8px;height:8px;border-radius:50%; background:var(--red); display:inline-block; animation:pulse 1.6s infinite}
    .team{background:#14161b; border:1px solid #23262e; border-radius:18px; padding:14px 15px; margin-bottom:12px; display:flex; align-items:center; gap:14px}
    .team .info{flex:1; min-width:0}
    .team .nm{font-weight:800; font-size:1.02rem}
    .team .pl{color:var(--muted); font-size:.76rem; margin-top:2px}
    .ring{width:74px;height:74px; flex:none; position:relative}
    .ring svg{transform:rotate(-90deg)}
    .ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
    .ring .num b{font-size:1.5rem; font-weight:900; line-height:1}
    .ring .num span{font-size:.6rem; color:var(--muted); font-weight:800}
    .addbtn{margin-top:4px; border-radius:999px; padding:13px; text-align:center; font-weight:900; color:#04121a; background:var(--grad); font-size:.95rem; box-shadow:0 10px 24px -8px rgba(34,211,238,.5)}

    /* sections */
    section{padding:72px 0}
    .sec-head{text-align:center; max-width:660px; margin:0 auto 50px}
    .sec-head h2{font-size:clamp(1.9rem,3.8vw,2.7rem); font-weight:900; letter-spacing:-.02em}
    .sec-head p{color:var(--muted); font-size:1.1rem; margin-top:14px}

    .features{display:grid; grid-template-columns:repeat(3,1fr); gap:20px}
    .card{background:linear-gradient(180deg,var(--surface),#101218); border:1px solid var(--border); border-radius:var(--radius); padding:26px; transition:transform .25s, border-color .25s}
    .card:hover{transform:translateY(-5px); border-color:#3a4150}
    .card .ico{width:48px;height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center; margin-bottom:18px; background:rgba(34,211,238,.1); border:1px solid rgba(34,211,238,.22)}
    .card .ico svg{width:24px;height:24px; stroke:var(--cyan)}
    .card h3{font-size:1.18rem; font-weight:800; margin-bottom:9px}
    .card p{color:var(--muted); font-size:.97rem}

    /* live split */
    .split{display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:center}
    .split .pts li{display:flex; gap:13px; margin-bottom:20px; align-items:flex-start}
    .split .pts .n{flex:none; width:32px;height:32px;border-radius:10px; background:var(--grad); color:#04121a; font-weight:900; display:flex;align-items:center;justify-content:center}
    .split .pts h4{font-weight:800; font-size:1.05rem}
    .split .pts p{color:var(--muted); font-size:.95rem}
    .qr-card{background:linear-gradient(180deg,var(--surface),#0e1015); border:1px solid var(--border); border-radius:24px; padding:34px; text-align:center}
    .qr-card .code{font-size:2.6rem; font-weight:900; letter-spacing:.32em; padding-left:.32em; background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; margin:6px 0 22px}
    .qr{width:172px;height:172px; margin:0 auto; background:#fff; border-radius:16px; padding:14px}
    .qr svg{width:100%;height:100%}

    /* themes */
    .themes{display:grid; grid-template-columns:repeat(4,1fr); gap:18px}
    .theme{border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; transition:transform .25s}
    .theme:hover{transform:translateY(-5px)}
    .theme .sw{height:120px; display:flex; align-items:flex-end; padding:14px}
    .theme .swdot{display:flex; gap:7px}
    .theme .swdot span{width:15px;height:15px;border-radius:50%; border:2px solid rgba(255,255,255,.25)}
    .theme .lbl{padding:14px 16px; background:var(--surface); font-weight:800}
    .theme .lbl small{display:block; color:var(--muted); font-weight:600; font-size:.8rem; margin-top:2px}

    /* faq */
    .faq{max-width:760px; margin:0 auto}
    .qa{border:1px solid var(--border); border-radius:14px; margin-bottom:12px; background:var(--surface); overflow:hidden}
    .qa summary{list-style:none; cursor:pointer; padding:20px 22px; font-weight:800; font-size:1.05rem; display:flex; justify-content:space-between; align-items:center; gap:14px}
    .qa summary::-webkit-details-marker{display:none}
    .qa summary .pm{color:var(--cyan); font-size:1.5rem; transition:transform .2s; flex:none}
    .qa[open] summary .pm{transform:rotate(45deg)}
    .qa .a{padding:0 22px 22px; color:var(--muted)}

    /* cta band */
    .cta-band{margin:30px auto 0; max-width:var(--maxw)}
    .cta-inner{position:relative; border-radius:30px; overflow:hidden; padding:64px 30px; text-align:center; background:linear-gradient(135deg,#0e2a33,#241a3d); border:1px solid var(--border)}
    .cta-inner h2{font-size:clamp(1.9rem,4vw,2.7rem); font-weight:900; letter-spacing:-.02em}
    .cta-inner p{color:#c8ccd4; margin:14px 0 28px; font-size:1.1rem}

    /* footer */
    footer{border-top:1px solid var(--border); margin-top:80px; padding:40px 0 56px}
    .foot{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px}
    .foot .links{display:flex; gap:26px; flex-wrap:wrap}
    .foot a{color:var(--muted); font-weight:600}
    .foot a:hover{color:var(--cyan)}
    .foot .copy{color:#5f636d; font-size:.88rem}
    .foot .copy b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

    /* reveal */
    .reveal{opacity:0; transform:translateY(24px); transition:opacity .7s, transform .7s}
    .reveal.in{opacity:1; transform:none}

    @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-16px) rotate(4deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    @media(max-width:900px){
      .hero-grid{grid-template-columns:1fr; gap:48px; text-align:center}
      .hero p.lead{margin-left:auto;margin-right:auto}
      .hero-logo{margin-left:auto;margin-right:auto; height:100px}
      .cta-row{justify-content:center}
      .features{grid-template-columns:1fr 1fr}
      .split{grid-template-columns:1fr; gap:36px}
      .themes{grid-template-columns:1fr 1fr}
      .nav-links{display:none}
    }
    @media(max-width:560px){
      .features{grid-template-columns:1fr}
      .foot{flex-direction:column; text-align:center}
      .phone{transform:none}
    }
    @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  </style>
</head>

  <script>
    // ---- bilingual ----
    function setLang(lang){
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-en]').forEach(function(el){
        var v = el.getAttribute('data-' + lang);
        if(v !== null) el.textContent = v;
      });
      document.querySelectorAll('.lang button').forEach(function(b){
        b.classList.toggle('on', b.dataset.lang === lang);
      });
      try{ localStorage.setItem('dp_lang', lang); }catch(e){}
    }
    document.querySelectorAll('.lang button').forEach(function(b){
      b.addEventListener('click', function(){ setLang(b.dataset.lang); });
    });
    (function(){
      var saved = null;
      try{ saved = localStorage.getItem('dp_lang'); }catch(e){}
      var lang = saved || ((navigator.language||'en').toLowerCase().indexOf('es')===0 ? 'es' : 'en');
      setLang(lang);
    })();

    // ---- header on scroll ----
    var nav = document.getElementById('nav');
    var onScroll = function(){ nav.classList.toggle('scrolled', window.scrollY > 12); };
    onScroll(); window.addEventListener('scroll', onScroll, {passive:true});

    // ---- scroll reveal ----
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, {threshold:.12});
    document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });

    // ---- year ----
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
